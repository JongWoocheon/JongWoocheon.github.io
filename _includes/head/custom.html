<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">

{% if page.mathjax %}
<style>
  /* Make lesson links in the left navigation easier to read. */
  .sidebar .nav__items > li > ul > li > a {
    font-size: 1em;
  }

  /* Give the lesson-group heading a slightly stronger visual hierarchy. */
  .sidebar .nav__title {
    font-size: 1.25em;
  }

  .callout {
    margin: 1.5em 0;
    padding: 1em 1.25em;
    border-left: 0.3rem solid;
    border-radius: 0 0.25rem 0.25rem 0;
  }

  .callout__title {
    margin: 0 0 0.5em;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .callout > *:last-child {
    margin-bottom: 0;
  }

  .callout--note {
    color: #0c4a6e;
    background: #e0f2fe;
    border-color: #0284c7;
  }

  .callout--warning {
    color: #713f12;
    background: #fef3c7;
    border-color: #d97706;
  }

  /* Keep display equations visually separate and readable on small screens. */
  mjx-container[jax="CHTML"][display="true"] {
    display: block;
    max-width: 100%;
    margin: 1.25em 0 !important;
    padding: 0.35em 0;
    overflow-x: auto;
    overflow-y: hidden;
  }
</style>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    chtml: {
      displayAlign: 'center',
      displayIndent: '0'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}
