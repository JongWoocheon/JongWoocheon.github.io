<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">

<style>
  /* Keep emphasis scoped to the lesson link being hovered or selected. */
  .sidebar .nav__items > li > ul > li > a {
    font-size: 0.875em;
    font-weight: 400;
  }

  .mermaid {
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>

{% if page.mathjax %}
<style>
  .callout {
    margin: 1.5em 0;
    padding: 1em 1.25em;
    border-left: 0.3rem solid;
    border-radius: 0 0.25rem 0.25rem 0;
  }

  .callout__title {
    margin: 0 0 0.5em;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .callout > *:last-child {
    margin-bottom: 0;
  }

  .callout--quote {
    color: #4a4a4a;
    background: #f5f5f5;
    border-color: #9d9d9d;
  }

  .callout--danger {
    color: #9b1c2d;
    background: #fdeaec;
    border-color: #e83146;
  }

  .callout--question {
    color: #9a4d00;
    background: #fdf1e5;
    border-color: #ec7400;
  }

  .callout--success {
    color: #087a35;
    background: #e6f8ed;
    border-color: #08b94e;
  }

  .callout--abstract {
    color: #007878;
    background: #e5f8f8;
    border-color: #00bebc;
  }

  .callout--note {
    color: #0750a0;
    background: #e6f0fc;
    border-color: #086ddd;
  }

  .image-row {
    display: flex;
    gap: 20px;              /* 两张图片之间的间距 */
    justify-content: center;
    align-items: center;
  }

  .image-row img {
    width: 48%;             /* 每张占约一半 */
    height: auto;
  }

  /* Keep display equations visually separate and readable on small screens. */
  mjx-container[jax="CHTML"][display="true"] {
    display: block;
    max-width: 100%;
    margin: 1.25em 0 !important;
    padding: 0.35em 0;
    overflow-x: auto;
    overflow-y: hidden;
  }
</style>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    chtml: {
      displayAlign: 'center',
      displayIndent: '0'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}

{% if page.mermaid %}
<script defer src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  window.addEventListener('load', function () {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    mermaid.run({ querySelector: '.mermaid' });
  });
</script>
{% endif %}
