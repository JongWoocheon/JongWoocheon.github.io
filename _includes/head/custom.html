<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">

<style>
  /* Keep emphasis scoped to the lesson link being hovered or selected. */
  .sidebar .nav__items > li > ul > li > a {
    font-size: 0.875em;
    font-weight: 400;
  }

  .sidebar .nav__items > li > ul > li > a:hover,
  .sidebar .nav__items > li > ul > li > a.active {
    font-size: 0.875em;
    font-weight: 700;
  }
</style>

{% if page.mathjax %}
<style>
  .callout {
    margin: 1.5em 0;
    padding: 1em 1.25em;
    border-left: 0.3rem solid;
    border-radius: 0 0.25rem 0.25rem 0;
  }

  .callout__title {
    margin: 0 0 0.5em;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .callout > *:last-child {
    margin-bottom: 0;
  }

  .callout--note {
    color: #0c4a6e;
    background: #e0f2fe;
    border-color: #0284c7;
  }

  .callout--tip {
    color: #115e59;
    background: #e5f8f8;
    border-color: #14b8a6;
  }

  .callout--question {
    color: #713f12;
    background: #fef3c7;
    border-color: #d97706;
  }

  /* Keep display equations visually separate and readable on small screens. */
  mjx-container[jax="CHTML"][display="true"] {
    display: block;
    max-width: 100%;
    margin: 1.25em 0 !important;
    padding: 0.35em 0;
    overflow-x: auto;
    overflow-y: hidden;
  }
</style>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    chtml: {
      displayAlign: 'center',
      displayIndent: '0'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}

{% if page.mermaid %}
<script defer src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  window.addEventListener('load', function () {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    mermaid.run({ querySelector: '.mermaid' });
  });
</script>
{% endif %}
